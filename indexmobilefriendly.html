<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Three.js + GeoJSON</title>
     <link rel="icon" sizes="150x150" type="image/png" href="src/earth-icon.png" />
    <style>
      body {
        margin: 0;
        overflow: hidden;
        background: radial-gradient(circle at top, #0a1220 0%, #000 65%);
        color: #b6fdff;
        font-family: Inter, system-ui, sans-serif;
      }

      #autoRotateButton {
        position: fixed;
        left: 50%;
        bottom: 24px;
        transform: translateX(-50%);
        padding: 14px 28px;
        border: 1px solid rgba(120, 255, 255, 0.35);
        background: rgba(0, 24, 40, 0.88);
        color: #a8ffff;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        font-size: 0.95rem;
        border-radius: 999px;
        box-shadow: 0 0 20px rgba(0, 255, 255, 0.18), inset 0 0 1px rgba(255, 255, 255, 0.12);
        cursor: pointer;
        transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
        z-index: 10;
      }

      #autoRotateButton:hover {
        transform: translateX(-50%) scale(1.04);
        box-shadow: 0 0 28px rgba(0, 255, 255, 0.28), inset 0 0 2px rgba(255, 255, 255, 0.18);
      }

      #autoRotateButton.active {
        background: rgba(12, 60, 80, 0.95);
        border-color: #6bf1ff;
        color: #e8ffff;
      }

      #hudPanel {
        position: fixed;
        top: 24px;
        right: 24px;
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 12px 16px;
        border-radius: 18px;
        background: rgba(6, 18, 30, 0.88);
        border: 1px solid rgba(110, 230, 255, 0.18);
        box-shadow: 0 12px 40px rgba(0, 150, 255, 0.08);
        backdrop-filter: blur(12px);
        color: #c8f7ff;
        z-index: 11;
      }

      .hud-icon {
        width: 42px;
        height: 42px;
        border-radius: 50%;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at top left, rgba(90, 255, 255, 0.25), rgba(0, 20, 40, 0.95));
        box-shadow: inset 0 0 8px rgba(255, 255, 255, 0.08);
        font-size: 1.25rem;
      }

      .hud-title {
        font-size: 0.95rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        margin-bottom: 2px;
      }

      .hud-status {
        font-size: 0.86rem;
        color: #8effff;
      }

      #hudStatus {
        font-weight: 700;
        color: #fff;
      }

      @media (max-width: 768px) {
        #autoRotateButton {
          bottom: 48px;
        }
      }
    </style>
     <script type="importmap">
      {
			"imports": {
				"three": "https://cdn.jsdelivr.net/npm/three@0.170/build/three.module.js",
          "jsm/": "https://cdn.jsdelivr.net/npm/three@0.170/examples/jsm/",
          "dat.gui": "https://cdn.jsdelivr.net/npm/dat.gui@0.7.9/build/dat.gui.module.js"
        }
		}
    </script>
  </head>
  <body>
    <div id="hudPanel">
      <div class="hud-icon">🌐</div>
      <div class="hud-content">
        <div class="hud-title">Globe Control</div>
        <div class="hud-status">Status: <span id="hudStatus">OFF</span></div>
      </div>
    </div>
    <button id="autoRotateButton" type="button">AUTO-ROTATE OFF</button>
    <script type="module" src="index.js"></script>

    <!-- Credits: Robotic Bobby and Github Co-Pilot-->
  </body>
</html>
